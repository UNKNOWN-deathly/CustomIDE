<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CustomIDE</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <div id="app">
      <header id="topbar">
        <button id="btn-open-folder">Open Folder</button>
        <span id="workspace-label">No workspace</span>
        <span class="spacer"></span>
        <button id="btn-shell">Shell</button>
        <button id="btn-run">Run File</button>
        <button id="btn-ruff">Run Ruff</button>
        <button id="btn-save">Save</button>
      </header>
      <main id="body">
        <aside id="sidebar">
          <nav id="activity-rail">
            <button class="rail-btn active" data-mode="explorer" title="Explorer">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M4 20h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.93a2 2 0 0 1-1.66-.9l-.82-1.2A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13a2 2 0 0 0 2 2z"></path>
              </svg>
            </button>
            <button class="rail-btn" data-mode="search" title="Search">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"></circle>
                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
              </svg>
            </button>
            <button class="rail-btn" data-mode="run" title="Run/Test">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <polygon points="5 3 19 12 5 21 5 3"></polygon>
              </svg>
            </button>
          </nav>
          <section id="sidebar-panel">
            <div id="panel-explorer" class="sidebar-view"></div>
            <div id="panel-search" class="sidebar-view hidden">
              <p class="placeholder">Search — placeholder.</p>
            </div>
            <div id="panel-run" class="sidebar-view hidden">
              <p class="placeholder">Run/Test — placeholder.</p>
            </div>
          </section>
        </aside>
        <div id="sidebar-resizer" class="resizer vertical-resizer"></div>
        <section id="center">
          <div id="tabs"></div>
          <div id="editor-shell">
            <div id="editor-empty-state">
              <div class="empty-state-container">
                <div class="empty-state-logo">
                  <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 2s8 4 8 10-8 10-8 10-8-4-8-10S12 2 12 2z"></path>
                    <path d="M12 6v12M8 10h8"></path>
                  </svg>
                </div>
                <h1>Custom Python IDE</h1>
                <p class="empty-state-subtitle">A focused, lightweight environment for Python developers</p>
                <div id="recent-projects-section" class="empty-state-recent hidden">
                  <h2 class="recent-title">Recent Projects</h2>
                  <div id="recent-projects-list" class="recent-list"></div>
                  <button id="btn-empty-open-folder" class="recent-open-btn">Open Folder...</button>
                </div>
                <div class="empty-state-shortcuts">
                  <div class="shortcut-row">
                    <span class="shortcut-label">Open Folder</span>
                    <span class="shortcut-key">Click "Open Folder"</span>
                  </div>
                  <div class="shortcut-row">
                    <span class="shortcut-label">Save Active File</span>
                    <span class="shortcut-key">Ctrl + S</span>
                  </div>
                  <div class="shortcut-row">
                    <span class="shortcut-label">Run Program</span>
                    <span class="shortcut-key">Click "Run File"</span>
                  </div>
                </div>
              </div>
            </div>
            <div id="editor" class="hidden"></div>
          </div>
        </section>
      </main>
      <div id="bottom-resizer" class="resizer horizontal-resizer"></div>
      <footer id="bottom">
        <nav id="bottom-tabs">
          <button class="bottom-tab active" data-mode="terminal">Terminal</button>
          <button class="bottom-tab" data-mode="problems">Problems</button>
        </nav>
        <div id="bottom-content">
          <div id="terminal" class="bottom-view"></div>
          <div id="problems" class="bottom-view hidden"></div>
        </div>
      </footer>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
